# CornellNTO environment
# Known issue: `conda run -n CornellNTO` may resolve to a different active env.
# Use the full Python path to run scripts reliably:
#   /path/to/anaconda3/envs/CornellNTO/bin/python src/process_video.py ...
name: CornellNTO
channels:
  - conda-forge
dependencies:
  - python=3.10
  - ffmpeg
  - tesseract
  - llvmlite
  - numba
  - librosa

  - pip

  - pip:
      # PyTorch (MPS-compatible macOS build — standard PyPI wheel includes MPS)
      # Note: conda's llvmlite/numba constraint pins torch to 2.2.2 on this system.
      # pyannote.audio 3.4 and transformers prefer torch>=2.4; Whisper runs on CPU as workaround.
      # In production, decouple numba from the PyTorch environment or use torch>=2.4.
      - torch
      - torchaudio
      - torchvision

      # ASR
      - openai-whisper

      # Speaker diarization / speech pipelines
      - pyannote.audio
      - speechbrain

      # HF ecosystem
      - transformers
      - accelerate
      - datasets
      - huggingface_hub
      - sentencepiece
      - safetensors

      # Core scientific / data stack
      # numpy pinned <2 for torch 2.2.x compatibility (sparse MPS ops incompatibility)
      - "numpy<2"
      - scipy
      - pandas
      - scikit-learn
      - scikit-image
      - matplotlib

      # Validation / schemas / config
      - pydantic
      - jsonschema
      - pyyaml
      - python-dotenv

      # CLI / logging / utilities
      - tqdm
      - rich
      - typer
      - tabulate

      # Video / audio
      - ffmpeg-python
      - moviepy
      - imageio
      - imageio-ffmpeg
      - pillow
      - opencv-python

      # Audio tooling
      - soundfile
      - audioread

      # OCR
      - pytesseract

      # Optional: gesture / pose
      - mediapipe

      # Export helpers
      - openpyxl
      - xlsxwriter

      # Jupyter
      - jupyterlab
      - ipykernel

      # General utilities
      - orjson
      - more-itertools
